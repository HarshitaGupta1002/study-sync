<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBuddy | Profile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-container {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #4facfe;
      object-fit: cover;
    }

    .profile-info h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .profile-info p {
      color: gray;
      margin: 5px 0;
    }

    .edit-btn {
      background: #4facfe;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Badges */
    .badges {
      margin-bottom: 30px;
    }

    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 15px;
    }

    .badge {
      text-align: center;
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .badge:hover {
      transform: scale(1.05);
    }

    .badge img {
      width: 50px;
      height: 50px;
      margin-bottom: 5px;
    }

    /* Streak */
    .streak {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1.2rem;
    }

    .streak span {
      font-weight: bold;
      color: #ff5722;
    }

    /* Friends */
    .friends {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .friends-list {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .friend {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .friend img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #4facfe;
    }

    .friend p {
      margin: 5px 0 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <h1>👤 My Profile</h1>
    <button class="logout-btn">Logout</button>
  </header>

  <main class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Menu</h2>
      <ul>
        <li><a href="index.html">🏠</a></li>
        <li><a href="friends.html">👥</a></li>
        <li><a href="courses.html">📚</a></li>
        <li><a href="projects.html">🚀</a></li>
        <li><a href="hackathons.html">🎯</a></li>
        <li><a href="settings.html" class="active">⚙️</a></li>
      </ul>
    </aside>

    <!-- Content -->
    <section class="content">

      <!-- Profile -->
      <div class="profile-container">
        <img src="https://i.pravatar.cc/100" alt="Profile Picture" class="profile-pic">
        <div class="profile-info">
          <h2>Harshita Gupta</h2>
          <p>🌟 CSE Student | Study Buddy Explorer</p>
          <button class="edit-btn">Edit Profile</button>
        </div>
      </div>

      <!-- Badges -->
      <div class="badges">
        <h3>🏅 Badges</h3>
        <div class="badges-grid">
          <div class="badge">
            <img src="https://img.icons8.com/color/96/medal.png" alt="Badge">
            <p>Top Performer</p>
          </div>
          <div class="badge">
            <img src="https://img.icons8.com/color/96/trophy.png" alt="Badge">
            <p>Hackathon Winner</p>
          </div>
          <div class="badge">
            <img src="https://img.icons8.com/color/96/fire-element.png" alt="Badge">
            <p>30 Day Streak</p>
          </div>
          <div class="badge">
            <img src="https://img.icons8.com/color/96/star.png" alt="Badge">
            <p>Helper</p>
          </div>
        </div>
      </div>

      <!-- Streak -->
      <div class="streak">
        <span>🔥 14-Day Streak!</span> Keep going strong 💪
      </div>

      <!-- Friends -->
      <div class="friends">
        <h3>👥 Study Buddies</h3>
        <div class="friends-list">
          <div class="friend">
            <img src="https://i.pravatar.cc/60?img=5" alt="Friend">
            <p>Rashmi</p>
          </div>
          <div class="friend">
            <img src="https://i.pravatar.cc/60?img=8" alt="Friend">
            <p>Avika</p>
          </div>
          <div class="friend">
            <img src="https://i.pravatar.cc/60?img=12" alt="Friend">
            <p>Harshita</p>
          </div>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
